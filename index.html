<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 20px;
        }
        .btn {
            display: inline-block;
            background-color: #238636;
            color: #ffffff;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 20px;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #2ea043;
        }
        .timer {
            font-size: 14px;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Main Call to Action Button -->
        <a href="https://coremerch.github.io/store/index.html" id="cta-btn" class="btn">Go to Store Now</a>
        
        <!-- Countdown Timer Text -->
        <div class="timer">
            You will be automatically redirected in <span id="countdown">30</span> seconds.
        </div>
    </div>

    <script>
        // Configuration
        const targetUrl = "https://coremerch.github.io/store/index.html";
        let timeLeft = 30;
        
        const countdownEl = document.getElementById('countdown');
        const ctaBtn = document.getElementById('cta-btn');

        // Track if the button has been pressed
        let buttonPressed = false;

        // Add event listener to stop the automatic redirect timer if clicked
        ctaBtn.addEventListener('click', () => {
            buttonPressed = true;
        });

        // Countdown and redirect logic
        const redirectTimer = setInterval(() => {
            if (buttonPressed) {
                clearInterval(redirectTimer);
                return;
            }

            timeLeft--;
            countdownEl.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(redirectTimer);
                window.location.href = targetUrl;
            }
        }, 1000);
    </script>

</body>
</html>
