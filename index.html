<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Access | CoreMerch</title>
    <!-- Modern Google Font -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f17;
            --card-bg: #131a26;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            max-width: 440px;
            width: 100%;
            padding: 40px 32px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Psychological Trigger: Scarcity/Exclusivity Banner */
        .badge {
            display: inline-flex;
            align-items: center;
            background: rgba(245, 158, 11, 0.1);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 24px;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.2;
            margin: 0 0 12px 0;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin: 0 0 32px 0;
        }

        .btn {
            display: block;
            background-color: var(--primary);
            color: #ffffff;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Psychological Trigger: Urgency Counter */
        .timer-container {
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        #countdown {
            color: var(--text-main);
            font-weight: 700;
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
        }

        /* Psychological Trigger: Social Proof Footer */
        .social-proof {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Trigger 1: Scarcity -->
        <div class="badge">⚠️ Limited Stock Available</div>
        
        <h1>Unlock Member Pricing</h1>
        <p>Your session is secured. Claim your exclusive store discount before the portal closes.</p>
        
        <a href="#" id="cta-btn" class="btn">Enter Official Store</a>
        
        <!-- Trigger 2: Urgency -->
        <div class="timer-container">
            Securing connection... Auto-forwarding in <span id="countdown">30</span>s
        </div>

        <!-- Trigger 3: Social Proof -->
        <div class="social-proof">
            <div class="pulse-dot"></div>
            <span><strong style="color: #fff;" id="live-counter">142</strong> shoppers browsing right now</span>
        </div>
    </div>

    <script>
        const baseTargetUrl = "https://coremerch.github.io/store/index.html";
        let timeLeft = 30;
        
        const countdownEl = document.getElementById('countdown');
        const ctaBtn = document.getElementById('cta-btn');
        const liveCounterEl = document.getElementById('live-counter');

        // Dynamic Source Tracking Setup
        const urlParams = new URLSearchParams(window.location.search);
        const trafficSource = urlParams.get('src') || 'direct';
        const dynamicTargetUrl = `${baseTargetUrl}?utm_source=${trafficSource}`;
        
        ctaBtn.href = dynamicTargetUrl;

        let buttonPressed = false;
        ctaBtn.addEventListener('click', () => {
            buttonPressed = true;
        });

        // Countdown and redirect logic
        const redirectTimer = setInterval(() => {
            if (buttonPressed) {
                clearInterval(redirectTimer);
                return;
            }

            timeLeft--;
            countdownEl.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(redirectTimer);
                window.location.href = dynamicTargetUrl;
            }
        }, 1000);

        // Make the social proof live counter fluctuate slightly to look real
        setInterval(() => {
            const current = parseInt(liveCounterEl.textContent);
            const change = Math.floor(Math.random() * 7) - 3; // Varries by -3 to +3
            liveCounterEl.textContent = Math.max(130, current + change);
        }, 4000);
    </script>

</body>
</html>
